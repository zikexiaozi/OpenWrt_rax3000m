#云编译公用核心
name: OWRT-CORE
on: 
  #公用核心标识
  workflow_call:
    inputs:
      OWRT_TARGET:
        required: true
        type: string
      OWRT_THEME:
        required: true
        type: string
      OWRT_NAME:
        required: true
        type: string
      OWRT_URL:
        required: true
        type: string
      OWRT_PW:
        required: true
        type: string
      OWRT_IP:
        required: true
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  OWRT_TARGET: ${{inputs.OWRT_TARGET}}
  OWRT_THEME: ${{inputs.OWRT_THEME}}
  OWRT_NAME: ${{inputs.OWRT_NAME}}
  OWRT_URL: ${{inputs.OWRT_URL}}
  OWRT_PW: ${{inputs.OWRT_PW}}
  OWRT_IP: ${{inputs.OWRT_IP}}
  REPO_BRANCH: openwrt-24.10-6.6

jobs:
  owrt_core:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main
        
      - name: 检查磁盘空间
        run: |
          MIN_SPACE=10
          AVAILABLE=$(df -BG . | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ -z "$AVAILABLE" ] || [ "$AVAILABLE" -lt "$MIN_SPACE" ]; then
            echo "错误：磁盘空间不足，可用空间 ${AVAILABLE}G，需至少 ${MIN_SPACE}G"
            exit 1
          fi
          echo "可用磁盘空间：${AVAILABLE}G"
          
      - name: 清理磁盘安装环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker system prune -a -f
          curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /var/lib/docker
          sudo -E apt-get -qq update
          sudo -E apt -yqq purge $(cat $GITHUB_WORKSPACE/Depends.txt | sed -n "2{s/\r$//;p;q}")
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq install $(cat $GITHUB_WORKSPACE/Depends.txt | sed -n "3{s/\r$//;p;q}")
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          # 清理大文件
          sudo rm -rf /usr/local/share/powershell >/dev/null 2>&1
          sudo rm -rf /usr/local/share/chromium >/dev/null 2>&1
          sudo rm -rf /usr/local/share/edge >/dev/null 2>&1
          # 清理日志
          sudo rm -rf /var/log/* >/dev/null 2>&1
          echo ">>> 当前磁盘空间"
          df -hT
      - name: 初始化值
        run: |
          export OWRT_DATE=$(TZ=UTC-8 date +"%Y.%m.%d_%H.%M.%S")
          export OWRT_SOURCE=$(echo $OWRT_URL | cut -d '/' -f 5-)
          export OWRT_TYPE=$(sed -n "1{s/^#//;s/\r$//;p;q}" $GITHUB_WORKSPACE/Config/RAX3000m.txt)

          echo "OWRT_SOURCE=$OWRT_SOURCE" >> $GITHUB_ENV
          echo "OWRT_TARGET=$OWRT_TARGET" >> $GITHUB_ENV
          echo "OWRT_DATE=$OWRT_DATE" >> $GITHUB_ENV
          echo "OWRT_TYPE=$OWRT_TYPE" >> $GITHUB_ENV
          echo "OWRT_PW=$OWRT_PW" >> $GITHUB_ENV
          echo "OWRT_IP=$OWRT_IP" >> $GITHUB_ENV

      - name: 扩大磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          
      - name: 扩容 /tmp 到 4GB
        run: |
          # 如果 /tmp 本身就是 tmpfs，它会调整大小；如果不是，它会挂载一个新的
          sudo mount -t tmpfs -o remount,size=4G /tmp || sudo mount -t tmpfs -o size=4G tmpfs /tmp
          echo ">>> /tmp 扩容完成"
          df -hT /tmp
        
      - name: Checkout
        uses: actions/checkout@main
          
      - name: Check Scripts
        run: |
          cd ./Scripts

          dos2unix ./*.sh
          chmod +x ./*.sh

      - name: Clone OWRT Code
        run: |
          git clone $OWRT_URL -b $REPO_BRANCH ./owrt
          
      - name: Load custom feeds
        run: |
          cd ./owrt
          echo 'src-git smpackage https://github.com/kenzok8/small' >> feeds.conf.default

      - name: Update Feeds
        run: |
          cd ./owrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Scripts
        run: |
          cd ./owrt

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          cd ./package

          $GITHUB_WORKSPACE/Scripts/Plugins.sh

      - name: Custom Settings
        run: |
          cd ./owrt
          
          rm -rf ./tmp* ./.config*
          cp "$GITHUB_WORKSPACE/Config/RAX3000m.txt" "./"
          ls
          mv RAX3000m.txt .config

          $GITHUB_WORKSPACE/Scripts/Extras.sh

          make defconfig
          
      - name: 启用 ccache
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"

          echo "=== 清理之前可能出错的 ccache 配置 ==="
          # 删除从 '# Enable ccache' 到文件结束的所有行（防重复/出错）
          sed -i '/# Enable ccache for all builds/,$d' include/toplevel.mk

          echo "=== 追加 ccache 配置 ==="
          cat >> include/toplevel.mk << 'EOF'

          # Enable ccache for host/toolchain only
          export CCACHE_DIR=$(TOPDIR)/.ccache
          export CCACHE_BASEDIR=$(TOPDIR)
          export CCACHE_COMPRESS=1
          export CCACHE_SLOPPINESS=time_macros

          # 禁止 ccache 参与 kernel 编译（关键）
          export CCACHE_NOHASHDIR=1
          export CCACHE_NODIRECT=1
          export CCACHE_DISABLE=1

          # 仅在 host/toolchain 阶段启用 ccache
          ifneq ($(findstring host,$(MAKECMDGOALS)),)
            export CCACHE_DISABLE=0
          endif
          ifneq ($(findstring toolchain,$(MAKECMDGOALS)),)
            export CCACHE_DISABLE=0
          endif
          EOF

          # 顺便再显示最后 15 行确认
          echo "=== toplevel.mk 最后 15 行 ==="
          tail -n 15 include/toplevel.mk

          # 强制把文件转成 unix 格式 + 去掉可能的尾随空格
          sed -i 's/[ \t]*$//' include/toplevel.mk
          
      - name: Cleanup Toolchain
        run: |
          cd ./owrt
          make dirclean
          
      - name: Force Clean Rust Build
        run: |
        
          echo "设置 Rust 构建文件..."
          MAKEFILE_PATH="owrt/feeds/packages/lang/rust/Makefile"
          sed -i 's|	--set=llvm.download-ci-llvm=true |	--set=llvm.download-ci-llvm=false |g' "$MAKEFILE_PATH"
          
      - name: Download Packages
        run: |
          cd ./owrt
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd ./owrt
          make -j $(($(nproc)+1)) || make -j$(nproc) V=s || make -j1 V=s
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./owrt && mkdir ./upload

          rm -rf $(find ./bin/targets/ -iregex ".*\(json\|manifest\|buildinfo\|sha256sums\|packages\)$")
          cp -rf $(find ./bin/targets/ -type f -iname "*.*") ./upload/
          cp -rf ./.config ./upload/Config_"$OWRT_TARGET"_"$OWRT_SOURCE"_"$OWRT_DATE".txt

          cd ./upload

          $GITHUB_WORKSPACE/Scripts/Renames.sh

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.OWRT_TARGET}}_${{env.OWRT_SOURCE}}_${{env.OWRT_DATE}}
          files: ./owrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，更就完事了！
            闭源固件源码：https://github.com/padavanonly/immortalwrt-mt798x-6.6

            源码：${{env.OWRT_SOURCE}}
            平台：${{env.OWRT_TARGET}}
            设备：${{env.OWRT_TYPE}}
            密码：${{env.OWRT_PW}}
            地址：${{env.OWRT_IP}}

      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 6
          delete_tags: true

      - name: Delete Old Workflows
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 1
