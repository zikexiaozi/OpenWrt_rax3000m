#云编译公用核心
name: OWRT-CORE
on: 
  #公用核心标识
  workflow_call:
    inputs:
      OWRT_TARGET:
        required: true
        type: string
      OWRT_THEME:
        required: true
        type: string
      OWRT_NAME:
        required: true
        type: string
      OWRT_URL:
        required: true
        type: string
      OWRT_PW:
        required: true
        type: string
      OWRT_IP:
        required: true
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  OWRT_TARGET: ${{inputs.OWRT_TARGET}}
  OWRT_THEME: ${{inputs.OWRT_THEME}}
  OWRT_NAME: ${{inputs.OWRT_NAME}}
  OWRT_URL: ${{inputs.OWRT_URL}}
  OWRT_PW: ${{inputs.OWRT_PW}}
  OWRT_IP: ${{inputs.OWRT_IP}}
  REPO_BRANCH: openwrt-24.10-6.6

jobs:
  owrt_core:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main
        
      - name: 检查磁盘空间
        run: |
          MIN_SPACE=10
          AVAILABLE=$(df -BG . | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ -z "$AVAILABLE" ] || [ "$AVAILABLE" -lt "$MIN_SPACE" ]; then
            echo "错误：磁盘空间不足，可用空间 ${AVAILABLE}G，需至少 ${MIN_SPACE}G"
            exit 1
          fi
          echo "可用磁盘空间：${AVAILABLE}G"
          
      - name: 清理磁盘安装环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker system prune -a -f
          curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /var/lib/docker
          sudo -E apt-get -qq update
          sudo -E apt -yqq purge $(cat $GITHUB_WORKSPACE/Depends.txt | sed -n "2{s/\r$//;p;q}")
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq install $(cat $GITHUB_WORKSPACE/Depends.txt | sed -n "3{s/\r$//;p;q}")
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          # 清理大文件
          sudo rm -rf /usr/local/share/powershell >/dev/null 2>&1
          sudo rm -rf /usr/local/share/chromium >/dev/null 2>&1
          sudo rm -rf /usr/local/share/edge >/dev/null 2>&1
          # 清理日志
          sudo rm -rf /var/log/* >/dev/null 2>&1
          echo ">>> 当前磁盘空间"
          df -hT
      - name: 初始化值
        run: |
          export OWRT_DATE=$(TZ=UTC-8 date +"%Y.%m.%d_%H.%M.%S")
          export OWRT_SOURCE=$(echo $OWRT_URL | cut -d '/' -f 5-)
          export OWRT_TYPE=$(sed -n "1{s/^#//;s/\r$//;p;q}" $GITHUB_WORKSPACE/Config/RAX3000m.txt)

          echo "OWRT_SOURCE=$OWRT_SOURCE" >> $GITHUB_ENV
          echo "OWRT_TARGET=$OWRT_TARGET" >> $GITHUB_ENV
          echo "OWRT_DATE=$OWRT_DATE" >> $GITHUB_ENV
          echo "OWRT_TYPE=$OWRT_TYPE" >> $GITHUB_ENV
          echo "OWRT_PW=$OWRT_PW" >> $GITHUB_ENV
          echo "OWRT_IP=$OWRT_IP" >> $GITHUB_ENV

      - name: 扩大磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024
          
      - name: 扩容 /tmp 到 4GB
        run: |
          # 如果 /tmp 本身就是 tmpfs，它会调整大小；如果不是，它会挂载一个新的
          sudo mount -t tmpfs -o remount,size=4G /tmp || sudo mount -t tmpfs -o size=4G tmpfs /tmp
          echo ">>> /tmp 扩容完成"
          df -hT /tmp
        
      - name: Checkout
        uses: actions/checkout@main
          
      - name: Check Scripts
        run: |
          cd ./Scripts

          dos2unix ./*.sh
          chmod +x ./*.sh

      - name: Clone OWRT Code
        run: |
          git clone $OWRT_URL -b $REPO_BRANCH ./owrt
          
      - name: Load custom feeds
        run: |
          cd ./owrt
          echo 'src-git smpackage https://github.com/kenzok8/small' >> feeds.conf.default

      - name: Update Feeds
        run: |
          cd ./owrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Scripts
        run: |
          cd ./owrt

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          cd ./package

          $GITHUB_WORKSPACE/Scripts/Plugins.sh

      - name: Custom Settings
        run: |
          cd ./owrt
          
          rm -rf ./tmp* ./.config*
          cp "$GITHUB_WORKSPACE/Config/RAX3000m.txt" "./"
          ls
          mv RAX3000m.txt .config

          $GITHUB_WORKSPACE/Scripts/Extras.sh

          make defconfig
          
      - name: Cleanup Toolchain
        run: |
          cd ./owrt
          make dirclean
          
      - name: Force Clean Rust Build
        run: |
        
          echo "设置 Rust 构建文件..."
          MAKEFILE_PATH="owrt/feeds/packages/lang/rust/Makefile"
          sed -i 's|	--set=llvm.download-ci-llvm=true |	--set=llvm.download-ci-llvm=false |g' "$MAKEFILE_PATH"
          
      - name: 获取磁盘增长缓存
        uses: actions/cache@v4
        with:
          path: openwrt/disk-growth.txt
          key: ${{ env.REPO_PATH }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_MODEL }}-disk-growth
          
      - name: 获取磁盘增长动态
        id: compile
        run: |
          # -------------------------
          # 磁盘增长缓存
          # -------------------------
          # 默认最大增长（35GB）
          DEFAULT_MAX=$((35 * 1024 * 1024 * 1024))
          if [ -f disk-growth.txt ]; then
            MAX_GROWTH=$(cat disk-growth.txt)
            echo "📁 已加载历史磁盘增长值：$(echo $((MAX_GROWTH/1024/1024/1024))) GB"
          else
            MAX_GROWTH=$DEFAULT_MAX
            echo "📁 未找到历史缓存，使用默认最大增长：35GB"
          fi

          # 记录初始磁盘占用
          START=$(df -B1 "${GITHUB_WORKSPACE}" | awk 'NR==2{print $3}')
          # -------------------------
          # 启动后台监控（双循环）
          # -------------------------
          (
            RUNTIME_MAX=$MAX_GROWTH
            LAST_OUTPUT_TIME=$(date +%s)
            INTERVAL=300
            # 颜色定义
            RED="\033[31m"
            GREEN="\033[32m"
            YELLOW="\033[33m"
            BLUE="\033[34m"
            MAGENTA="\033[35m"
            CYAN="\033[36m"
            RESET="\033[0m"
            # 事件循环：监听 build.log
            tail -F build.log 2>/dev/null | while read -r LINE; do
              echo "$LINE" > /tmp/last_line
            done &
            # -------------------------
            # 心跳循环
            # -------------------------
            STAGE="${CYAN}初始化${RESET}"
            while true; do
              NOW=$(date +%s)
              LINE=$(cat /tmp/last_line 2>/dev/null || echo "")
              # -------------------------
              # 阶段识别（根据日志内容）
              # -------------------------
              if echo "$LINE" | grep -qE "make\[[0-9]+\].*-C tools/"; then
                STAGE="${CYAN}Tools (10%)${RESET}"
              elif echo "$LINE" | grep -qE "make\[[0-9]+\].*-C toolchain/"; then
                STAGE="${BLUE}Toolchain (25%)${RESET}"
              elif echo "$LINE" | grep -qE "make\[[0-9]+\].*-C target/linux"; then
                STAGE="${MAGENTA}Target (45%)${RESET}"
              elif echo "$LINE" | grep -qE "make\[[0-9]+\].*-C package/"; then
                STAGE="${YELLOW}Package (70%)${RESET}"
              elif echo "$LINE" | grep -qE "make\[[0-9]+\].*-C package/install"; then
                STAGE="${GREEN}Install (90%)${RESET}"
              fi

              # -------------------------
              # 磁盘监控
              # -------------------------
              USED=$(df -B1 "${GITHUB_WORKSPACE}" | awk 'NR==2{print $3}')
              DELTA=$((USED - START))
              if [ $DELTA -gt $RUNTIME_MAX ]; then
                RUNTIME_MAX=$DELTA
              fi
              echo "$RUNTIME_MAX" > /tmp/max_growth_runtime
              # -------------------------
              # 定时刷新（每 5 分钟）
              # -------------------------
              if [ $((NOW - LAST_OUTPUT_TIME)) -ge $INTERVAL ]; then
                LAST_OUTPUT_TIME=$NOW
                PERCENT=$((DELTA * 100 / RUNTIME_MAX))
                [ $PERCENT -gt 100 ] && PERCENT=100
                echo -e "${MAGENTA}========== ⏳ 定时刷新 ($(date '+%H:%M:%S'))  ⏳ ==========${RESET}"
                echo -e "📦 磁盘信息：${CYAN}$(df -h "${GITHUB_WORKSPACE}" | awk 'NR==2{print $3 "/" $2 " used (" $5 ")"}')${RESET}"
                echo -e "📊 估算进度：${YELLOW}${PERCENT}%${RESET}"
                echo -e "📌 当前阶段：${STAGE}"
                echo "-----------------------------------------"
              fi
              sleep 1
            done
          ) &
          monitor_pid=$!

      - name: Download Packages
        run: |
          cd ./owrt
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd ./owrt
          make -j $(($(nproc)+1)) || make -j$(nproc) V=s || make -j1 V=s
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./owrt && mkdir ./upload

          rm -rf $(find ./bin/targets/ -iregex ".*\(json\|manifest\|buildinfo\|sha256sums\|packages\)$")
          cp -rf $(find ./bin/targets/ -type f -iname "*.*") ./upload/
          cp -rf ./.config ./upload/Config_"$OWRT_TARGET"_"$OWRT_SOURCE"_"$OWRT_DATE".txt

          cd ./upload

          $GITHUB_WORKSPACE/Scripts/Renames.sh

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.OWRT_TARGET}}_${{env.OWRT_SOURCE}}_${{env.OWRT_DATE}}
          files: ./owrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，更就完事了！
            闭源固件源码：https://github.com/padavanonly/immortalwrt-mt798x-6.6

            源码：${{env.OWRT_SOURCE}}
            平台：${{env.OWRT_TARGET}}
            设备：${{env.OWRT_TYPE}}
            密码：${{env.OWRT_PW}}
            地址：${{env.OWRT_IP}}

      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 6
          delete_tags: true

      - name: Delete Old Workflows
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 1
